server:
  port: 8080
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/workflow}
    username: ${SPRING_DATASOURCE_USERNAME:workflow}
    password: ${SPRING_DATASOURCE_PASSWORD:workflow}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
flowable:
  database-schema-update: true
  async-executor-activate: false
springdoc:
  api-docs:
    path: /v3/api-docs
app:
  jwt:
    secret: ${APP_JWT_SECRET:VGhpc0lzQVN1cGVyU2VjcmV0S2V5VGhhdElzQXRMZWFzdDMyQnl0ZXNMb25nISE=}
    expiration-sec: 86400
