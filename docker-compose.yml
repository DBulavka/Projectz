services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/workflow
      SPRING_DATASOURCE_USERNAME: workflow
      SPRING_DATASOURCE_PASSWORD: workflow
      APP_JWT_SECRET: ${APP_JWT_SECRET}
    depends_on: [postgres]
    ports: ["8080:8080"]

  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["5173:80"]

volumes:
  pgdata:
